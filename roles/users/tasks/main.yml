- name: Ensure users with extra groups exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell }}"
    groups: "{{ item.groups }}"
    append: true
    create_home: true
    state: present
  loop: "{{ users_list }}"
  when: item.groups is defined

- name: Ensure users without extra groups exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell }}"
    create_home: true
    state: present
  loop: "{{ users_list }}"
  when: item.groups is not defined

- name: Deploy SSH authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.ssh_key }}"
    state: present
  loop: "{{ users_list }}"
- name: Deploy sudoers file for privileged users
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  loop: "{{ users_list }}"
  when: item.sudo | default(false)
